AWSTemplateFormatVersion: "2010-09-09"
Description: TTC Real-Time Streaming Pipeline

Parameters:
  AccountId:
    Type: String
    Description: Your AWS account ID

Resources:

  # ── Kinesis Data Stream ──────────────────────────
  TTCVehicleStream:
    Type: AWS::Kinesis::Stream
    Properties:
      Name: ttc-vehicle-positions
      ShardCount: 1         # provisioned, cheapest for low volume

  # ── DynamoDB — vehicle state cache ──────────────
  VehicleStateTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: ttc-vehicle-state
      BillingMode: PAY_PER_REQUEST   # free tier, no provisioned cost
      AttributeDefinitions:
        - AttributeName: vehicle_id
          AttributeType: S
      KeySchema:
        - AttributeName: vehicle_id
          KeyType: HASH

  # ── S3 — data lake ───────────────────────────────
  DataLakeBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "ttc-data-lake-${AccountId}"

  # ── SNS — idle alerts ────────────────────────────
  IdleAlertTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: ttc-idle-alerts

Outputs:
  StreamName:
    Value: !Ref TTCVehicleStream
    Description: Kinesis stream name

  TableName:
    Value: !Ref VehicleStateTable
    Description: DynamoDB table name

  BucketName:
    Value: !Ref DataLakeBucket
    Description: S3 data lake bucket

  SNSTopicArn:
    Value: !Ref IdleAlertTopic
    Description: SNS topic ARN for idle alerts


# Deploy the stack:
# aws cloudformation deploy \
#   --template-file infrastructure/template.yaml \
#   --stack-name ttc-streaming-pipeline \
#   --region us-east-1 \
#   --parameter-overrides AccountId=YOUR_ACCOUNT_ID

# Teardown:
# aws cloudformation delete-stack --stack-name ttc-streaming-pipeline